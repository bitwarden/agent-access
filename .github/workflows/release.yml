name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
      publish_crates:
        description: "Publish library crates to crates.io"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            name: linux-x86_64
          - os: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
            name: macos-aarch64
          - os: macos-15
            target: x86_64-apple-darwin
            archive: tar.gz
            name: macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            name: windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          key: ${{ matrix.target }}

      - name: Build aac
        run: cargo build --release --target ${{ matrix.target }} -p ap-cli
        env:
          GIT_HASH: ${{ github.sha }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          tar -czf "aac-${{ matrix.name }}.tar.gz" -C "target/${{ matrix.target }}/release" aac

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target\${{ matrix.target }}\release\aac.exe" -DestinationPath "aac-${{ matrix.name }}.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: binaries-${{ matrix.name }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: build

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binaries-*
          merge-multiple: true
          path: artifacts/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            artifacts/*

  publish-crates:
    name: Publish to crates.io
    if: ${{ inputs.publish_crates == true }}
    runs-on: ubuntu-24.04
    needs: build

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          publish_crate() {
            local crate="$1"
            echo "Publishing $crate..."
            cargo publish -p "$crate"
            echo "Published $crate, waiting for crates.io to index..."
            sleep 30
          }

          # Publish in dependency order (leaf dependencies first)
          publish_crate ap-error-macro
          publish_crate ap-error
          publish_crate ap-noise
          publish_crate ap-proxy-protocol
          publish_crate ap-proxy-client
          publish_crate ap-proxy
          publish_crate ap-client
          publish_crate ap-cli
